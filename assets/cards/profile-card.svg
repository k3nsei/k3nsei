<svg
  width="700"
  height="200"
  viewBox="0 0 700 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <style>
    * {
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica,
        Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
    }
  </style>

  <rect
    class="card-surface"
    width="698"
    height="198"
    x="1"
    y="1"
    rx="5"
    ry="5"
    fill="#010409"
    stroke="#3D444D"
    stroke-width="1"
    stroke-opacity="1"
  />

  <text
    class="card-title"
    x="30"
    y="20"
    fill="#F0F6FC"
    font-size="22"
    text-anchor="start"
    dominant-baseline="hanging"
  >
    k3nsei (Piotr Stępniewski)
  </text>
  ;

  <g class="card-content" transform="translate(30, 46)" color="#9198A1">
    <rect
      class="card-content-surface"
      width="640"
      height="134"
      x="0"
      y="0"
      fill="none"
      stroke="none"
    />

    <g class="panel panel-details" transform="translate(0, 16)">
      <g class="section section-contributions" transform="translate(0, 0)">
        <use href="#icon-github" width="18" height="18" x="0" y="0" />
        <text
          x="22"
          y="14"
          fill="currentColor"
          font-size="14"
          text-anchor="start"
          dominant-baseline="auto"
        >
          2503 Contributions in 2026
        </text>
      </g>

      <g class="section section-repositories" transform="translate(0, 28)">
        <use href="#icon-book-marked" width="18" height="18" x="0" y="0" />
        <text
          x="22"
          y="14"
          fill="currentColor"
          font-size="14"
          text-anchor="start"
          dominant-baseline="auto"
        >
          24 Public Repos
        </text>
      </g>

      <g class="section section-date-joined" transform="translate(0, 56)">
        <use href="#icon-clock" width="18" height="18" x="0" y="0" />
        <text
          x="22"
          y="14"
          fill="currentColor"
          font-size="14"
          text-anchor="start"
          dominant-baseline="auto"
        >
          Joined GitHub 16 years ago
        </text>
      </g>

      <g class="section section-company" transform="translate(0, 84)">
        <use href="#icon-building" width="18" height="18" x="0" y="0" />
        <text
          x="22"
          y="14"
          fill="currentColor"
          font-size="14"
          text-anchor="start"
          dominant-baseline="auto"
        >
          @IdeaThenGo
        </text>
      </g>
    </g>

    <g class="panel panel-chart" transform="translate(-10, -20)">
      <use href="#chart-contributions" width="420" height="154" x="240" y="0" />
    </g>

    <!-- Definitions -->

    <defs>
      <symbol id="icon-book-marked" viewBox="0 0 24 24">
        <g
          class="icon icon-book-marked"
          fill="none"
          stroke="#4493F8"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M10 2v8l3-3 3 3V2" />
          <path
            d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"
          />
        </g>
      </symbol>
    </defs>

    <defs>
      <symbol id="icon-building" viewBox="0 0 24 24">
        <g
          class="icon icon-building"
          fill="none"
          stroke="#4493F8"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M10 12h4" />
          <path d="M10 8h4" />
          <path d="M14 21v-3a2 2 0 0 0-4 0v3" />
          <path
            d="M6 10H4a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2"
          />
          <path d="M6 21V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v16" />
        </g>
      </symbol>
    </defs>

    <defs>
      <symbol id="icon-clock" viewBox="0 0 24 24">
        <g
          class="icon icon-clock"
          fill="none"
          stroke="#4493F8"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 6v6l4 2" />
          <circle cx="12" cy="12" r="10" />
        </g>
      </symbol>
    </defs>

    <defs>
      <symbol id="icon-github" viewBox="0 0 24 24">
        <g
          class="icon icon-github"
          fill="none"
          stroke="#4493F8"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"
          />
          <path d="M9 18c-4.51 2-5-2-7-2" />
        </g>
      </symbol>
    </defs>

    <defs>
      <symbol id="icon-mail" viewBox="0 0 24 24">
        <g
          class="icon icon-mail"
          fill="none"
          stroke="#4493F8"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7" />
          <rect x="2" y="4" width="20" height="16" rx="2" />
        </g>
      </symbol>
    </defs>

    <defs>
      <symbol id="icon-map-pin" viewBox="0 0 24 24">
        <g
          class="icon icon-map-pin"
          fill="none"
          stroke="#4493F8"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M10 12h4" />
          <path d="M10 8h4" />
          <path d="M14 21v-3a2 2 0 0 0-4 0v3" />
          <path
            d="M6 10H4a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2"
          />
          <path d="M6 21V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v16" />
        </g>
      </symbol>
    </defs>

    <defs>
      <symbol id="chart-contributions" viewBox="0 0 420 154">
        <rect
          class="chart-surface"
          width="420"
          height="154"
          x="0"
          y="0"
          fill="none"
          stroke="none"
