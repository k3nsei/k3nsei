<svg
  width="700"
  height="200"
  viewBox="0 0 700 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <style>
    * {
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica,
        Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
    }
  </style>

  <rect
    class="card-surface"
    width="698"
    height="198"
    x="1"
    y="1"
    rx="5"
    ry="5"
    fill="#010409"
    stroke="#3D444D"
    stroke-width="1"
    stroke-opacity="1"
  />

  <text
    class="card-title"
    x="30"
    y="20"
    fill="#F0F6FC"
    font-size="22"
    text-anchor="start"
    dominant-baseline="hanging"
  >
    k3nsei (Piotr Stępniewski)
  </text>
  ;

  <g class="card-content" transform="translate(30, 46)" color="#9198A1">
    <rect
      class="card-content-surface"
      width="640"
      height="134"
      x="0"
      y="0"
      fill="none"
      stroke="none"
    />

    <g class="panel panel-details" transform="translate(0, 16)">
      <g class="section section-contributions" transform="translate(0, 0)">
        <use href="#icon-github" width="18" height="18" x="0" y="0" />
        <text
          x="22"
          y="14"
          fill="currentColor"
          font-size="14"
          text-anchor="start"
          dominant-baseline="auto"
        >
          1832 Contributions in 2026
        </text>
      </g>

      <g class="section section-repositories" transform="translate(0, 28)">
        <use href="#icon-book-marked" width="18" height="18" x="0" y="0" />
        <text
          x="22"
          y="14"
          fill="currentColor"
          font-size="14"
          text-anchor="start"
          dominant-baseline="auto"
        >
          24 Public Repos
        </text>
      </g>

      <g class="section section-date-joined" transform="translate(0, 56)">
        <use href="#icon-clock" width="18" height="18" x="0" y="0" />
        <text
          x="22"
          y="14"
          fill="currentColor"
          font-size="14"
          text-anchor="start"
          dominant-baseline="auto"
        >
          Joined GitHub 16 years ago
        </text>
      </g>

      <g class="section section-company" transform="translate(0, 84)">
        <use href="#icon-building" width="18" height="18" x="0" y="0" />
        <text
          x="22"
          y="14"
          fill="currentColor"
          font-size="14"
          text-anchor="start"
          dominant-baseline="auto"
        >
          @BetssonGroup
        </text>
      </g>
    </g>

    <g class="panel panel-chart" transform="translate(-10, -20)">
      <use href="#chart-contributions" width="420" height="154" x="240" y="0" />
    </g>

    <!-- Definitions -->

    <defs>
      <symbol id="icon-book-marked" viewBox="0 0 24 24">
        <g
          class="icon icon-book-marked"
          fill="none"
          stroke="#4493F8"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M10 2v8l3-3 3 3V2" />
          <path
            d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"
          />
        </g>
      </symbol>
    </defs>

    <defs>
      <symbol id="icon-building" viewBox="0 0 24 24">
        <g
          class="icon icon-building"
          fill="none"
          stroke="#4493F8"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
