            fill="rgb(from currentColor r g b / 45%)"
            stroke="currentColor"
          />

          <g
            class="x-axis"
            transform="translate(0, 112)"
            color="#9198A1"
            fill="none"
            font-size="10"
            text-anchor="middle"
            dominant-baseline="hanging"
          >
            <line
              class="line"
              x1="0"
              x2="360"
              y1="0"
              y2="0"
              stroke="currentColor"
            />

            <g class="tick" transform="translate(0, 0)">
              <line class="mark" y2="6" stroke="currentColor" />
              <text class="label" y="9" fill="currentColor">25/07</text>
            </g>

            <g class="tick" transform="translate(61.150684931506845, 0)">
              <line class="mark" y2="6" stroke="currentColor" />
              <text class="label" y="9" fill="currentColor">25/09</text>
            </g>

            <g class="tick" transform="translate(121.31506849315069, 0)">
              <line class="mark" y2="6" stroke="currentColor" />
              <text class="label" y="9" fill="currentColor">25/11</text>
            </g>

            <g class="tick" transform="translate(181.47945205479454, 0)">
              <line class="mark" y2="6" stroke="currentColor" />
              <text class="label" y="9" fill="currentColor">26/01</text>
            </g>

            <g class="tick" transform="translate(239.67123287671234, 0)">
              <line class="mark" y2="6" stroke="currentColor" />
              <text class="label" y="9" fill="currentColor">26/03</text>
            </g>

            <g class="tick" transform="translate(299.83561643835617, 0)">
              <line class="mark" y2="6" stroke="currentColor" />
              <text class="label" y="9" fill="currentColor">26/05</text>
            </g>

            <g class="tick" transform="translate(360, 0)">
              <line class="mark" y2="6" stroke="currentColor" />
              <text class="label" y="9" fill="currentColor">26/07</text>
            </g>
          </g>

          <g
            class="y-axis"
            transform="translate(360, 0)"
            color="#9198A1"
            fill="none"
            font-size="10"
            text-anchor="start"
            dominant-baseline="middle"
          >
            <line
              class="line"
              x1="0"
              x2="0"
              y1="0"
              y2="112"
              stroke="currentColor"
            />

            <g class="tick" transform="translate(0,112)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">0</text>
            </g>

            <g class="tick" transform="translate(0,94.76923076923077)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">100</text>
            </g>

            <g class="tick" transform="translate(0,77.53846153846153)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">200</text>
            </g>

            <g class="tick" transform="translate(0,60.30769230769231)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">300</text>
            </g>

            <g class="tick" transform="translate(0,43.07692307692307)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">400</text>
            </g>

            <g class="tick" transform="translate(0,25.84615384615384)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">500</text>
            </g>

            <g class="tick" transform="translate(0,8.61538461538461)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">600</text>
            </g>
          </g>
        </g>
      </symbol>
    </defs>
  </g>
</svg>
