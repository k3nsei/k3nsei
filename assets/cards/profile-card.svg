            <g class="tick" transform="translate(0,100.8)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">50</text>
            </g>

            <g class="tick" transform="translate(0,89.60000000000001)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">100</text>
            </g>

            <g class="tick" transform="translate(0,78.39999999999999)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">150</text>
            </g>

            <g class="tick" transform="translate(0,67.2)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">200</text>
            </g>

            <g class="tick" transform="translate(0,56)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">250</text>
            </g>

            <g class="tick" transform="translate(0,44.800000000000004)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">300</text>
            </g>

            <g class="tick" transform="translate(0,33.60000000000001)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">350</text>
            </g>

            <g class="tick" transform="translate(0,22.399999999999995)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">400</text>
            </g>

            <g class="tick" transform="translate(0,11.199999999999998)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">450</text>
            </g>

            <g class="tick" transform="translate(0,0)">
              <line class="mark" x2="6" stroke="currentColor" />
              <text class="label" x="9" fill="currentColor">500</text>
